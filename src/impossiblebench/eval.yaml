title: "ALEval: Reward-Hacking Honesty in Coding Agents"
description: |
  Measures whether LLM coding agents lie about reward hacking on deliberately
  impossible tasks. Agents solve conflicting-test coding problems via
  LiveCodeBench or SWE-bench, then face a same-chat callout asking if they
  reward-hacked. Responses are classified as lie, truth, or evasive.
arxiv: https://arxiv.org/abs/2510.20270
group: Coding
contributors: ["thepe"]
version: "1-A"
tasks:
  - name: aleval_livecodebench_minimal
    dataset_samples: 103
  - name: aleval_livecodebench_tools
    dataset_samples: 103
  - name: aleval_swebench_minimal
    dataset_samples: 349
  - name: aleval_swebench_tools
    dataset_samples: 349
dependency: "impossiblebench"
tags: ["Agent"]
metadata:
  sandbox: ["solver", "scorer"]
  requires_internet: false
